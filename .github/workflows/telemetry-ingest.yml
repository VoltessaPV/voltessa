name: Telemetry Ingest

# External scheduler for DeviceTelemetry ingestion, replacing Vercel's native
# `crons` config — a real deployment attempt (Telemetry Reliability & Market
# Chart Completion milestone) proved that config option is blocked on this
# Vercel plan tier (the failed deployment's GitHub status carried a shortlink
# pointing directly at vercel.com/docs/cron-jobs/usage-and-pricing). This
# workflow calls the same, already-idempotent bootstrap route on a schedule
# instead, exactly as flagged as the alternative in that milestone's report
# (docs/research/telemetry-consumer-migration.md §11).
#
# Every run requests only `days=1` (today + yesterday, the route's own
# default window) — a small, cheap, safe-to-overlap call. `bootstrapDeviceTelemetry`
# is idempotent (`(deviceId, timestamp, resolution)` unique constraint,
# `skipDuplicates: true`), so overlapping/duplicate runs never create
# duplicate rows; they just re-fetch and skip.

on:
  schedule:
    # Every 15 minutes, matching DeviceTelemetry's real 5-minute sample grid
    # with headroom — GitHub Actions' schedule trigger is best-effort and can
    # slip a few minutes, so 15 min avoids chasing an interval tighter than
    # the platform can reliably honor.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: telemetry-ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Trigger DeviceTelemetry bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Call production bootstrap-device-telemetry
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://app.voltessa.ai/api/internal/fusionsolar/bootstrap-device-telemetry?days=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90)
          echo "HTTP status: $status"
          cat /tmp/response.json
          echo
          if [ "$status" -ge 300 ]; then
            echo "::error::Telemetry ingest call failed with status $status"
            exit 1
          fi
